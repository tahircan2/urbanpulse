<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>UrbanPulse — Smart City Management</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="UrbanPulse - Intelligent Smart City Event and Incident Management Platform for Istanbul">
  <meta name="theme-color" content="#0A0E1A">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- DNS prefetch -->
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <link rel="dns-prefetch" href="https://tile.openstreetmap.org">

  <!-- Preconnect to font origins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Non-blocking font load: only used weights, latin subset -->
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap&subset=latin">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap&subset=latin"
    media="print" onload="this.media='all'">
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap&subset=latin">
  </noscript>
  <!-- Leaflet CSS, Font Awesome, SockJS/STOMP all bundled via angular.json - no CDN needed -->
</head>
<body>
  <app-root></app-root>
</body>
</html>
