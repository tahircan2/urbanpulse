<div class="auth-page">
  <div class="auth-card card">
    <div class="auth-logo">
      <div class="logo-icon"><i class="fas fa-city"></i></div>
      <h1>Urban<span>Pulse</span></h1>
    </div>
    <h2>Sign In</h2>
    <p class="auth-sub">Access the city management dashboard</p>

    @if (error()) {
      <div class="auth-error">
        <i class="fas fa-circle-exclamation"></i>{{ error() }}
      </div>
    }

    <div class="form-group">
      <label class="form-label">Email</label>
      <input
        class="form-input"
        type="email"
        [(ngModel)]="email"
        placeholder="ahmet@example.com"
        (keyup.enter)="submit()"
      />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input
        class="form-input"
        type="password"
        [(ngModel)]="password"
        placeholder="••••••••"
        (keyup.enter)="submit()"
      />
    </div>

    <button
      class="btn btn-primary btn-lg auth-btn"
      (click)="submit()"
      [disabled]="loading()"
    >
      @if (loading()) {
        <i class="fas fa-spinner fa-spin"></i> Signing in...
      } @else {
        <i class="fas fa-right-to-bracket"></i> Sign In
      }
    </button>

    <p class="auth-footer">
      Don't have an account? <a routerLink="/register">Register</a>
    </p>

    <div class="auth-hint">
      <span class="badge badge-cyan"
        >Demo logins (password: test123)</span
      >
      <code>admin&#64;urbanpulse.com</code>
      <code>staff&#64;urbanpulse.com</code>
      <code>ahmet&#64;example.com</code>
    </div>
  </div>
</div>
