name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:    ['backend/**']
  pull_request:
    branches: [main]
    paths:    ['backend/**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE:      urbanpulse_test
          MYSQL_USER:          urbanpulse_user
          MYSQL_PASSWORD:      urbanpulse_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Run tests
        run: mvn test
        env:
          SPRING_DATASOURCE_URL:      jdbc:mysql://localhost:3306/urbanpulse_test?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
          SPRING_DATASOURCE_USERNAME: urbanpulse_user
          SPRING_DATASOURCE_PASSWORD: urbanpulse_pass

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 7
