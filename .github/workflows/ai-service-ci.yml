name: AI Service CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'ai-service/**'
      - '.github/workflows/ai-service-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ai-service/**'

jobs:
  test:
    name: Test AI Service
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'ai-service/requirements.txt'

      - name: Install dependencies
        working-directory: ai-service
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        working-directory: ai-service
        run: |
          pip install ruff
          ruff check app/ tests/

      - name: Type check with mypy
        working-directory: ai-service
        run: |
          pip install mypy
          mypy app/ --ignore-missing-imports --strict

      - name: Run tests
        working-directory: ai-service
        env:
          ANTHROPIC_API_KEY: "sk-test-key-not-real"
          INTERNAL_SECRET: "test-secret"
        run: |
          pytest tests/ -v --asyncio-mode=auto

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t urbanpulse-ai:latest ./ai-service
